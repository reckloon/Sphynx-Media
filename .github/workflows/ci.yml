name: CI

on:
  push:
    branches: [main]
    tags: ['v*']        # a version tag (v0.4.0) triggers the publish job below
  pull_request:

# Monorepo: both packages live here, so the server's local-path dependency on
# sphynx-protocol resolves directly — no cross-repo checkout needed. Each job runs
# `swift test` for both packages, on macOS and in a Swift Linux container.
jobs:
  macos:
    name: macOS (swift test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - name: Test sphynx-protocol
        working-directory: sphynx-protocol
        run: swift test
      - name: Test sphynx-server
        working-directory: sphynx-server
        run: swift test

  # Build the slim runtime image and push it to GitHub's container registry
  # (GHCR) so end users can `docker pull` instead of compiling from source.
  # Only fires on a version tag (v*) AND only after both test jobs pass — a
  # release is a deliberate act, and a broken build can never reach users.
  #
  # Each arch builds on its OWN NATIVE runner (amd64 on ubuntu-latest, arm64 on
  # the github-hosted ubuntu-24.04-arm) instead of emulating arm64 under QEMU —
  # emulated Swift release builds take 1-2h; native is ~minutes. Each job pushes
  # an untagged image by digest; the `publish-merge` job then stitches the two
  # digests into one multi-arch manifest under the real tags.
  publish:
    name: Build image (${{ matrix.platform }})
    needs: [macos, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write          # lets GITHUB_TOKEN push to ghcr.io
    steps:
      - uses: actions/checkout@v4
      - name: Normalize platform name   # linux/amd64 -> linux-amd64 (artifact-safe)
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided; no secret to set up
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .                              # parent dir — Dockerfile needs BOTH packages
          file: sphynx-server/Dockerfile
          target: runtime                         # the slim runtime stage, not the test stage
          platforms: ${{ matrix.platform }}
          # Push the image with no tag and capture its digest; the merge job
          # below assembles the tagged multi-arch manifest from both digests.
          outputs: type=image,name=ghcr.io/reckloon/sphynx-server,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
      - name: Export digest to a file
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests into a single multi-arch image and apply the
  # real tags (v0.4.0 -> :0.4.0, :0.4, :latest).
  publish-merge:
    name: Publish image (GHCR)
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # contents:write so the job can create the GitHub Release
      packages: write
    steps:
      - uses: actions/checkout@v4   # needed to read CHANGELOG.md for the release notes
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/reckloon/sphynx-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Create and push the multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/reckloon/sphynx-server@sha256:%s ' *)
      - name: Inspect the published image
        run: docker buildx imagetools inspect ghcr.io/reckloon/sphynx-server:${{ steps.meta.outputs.version }}
      # A pushed tag is just a git pointer; this turns it into a GitHub *Release*
      # (the Releases page entry + "Latest" badge), with notes lifted from the
      # matching CHANGELOG.md section. Idempotent so a re-run updates in place.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version='${{ steps.meta.outputs.version }}'
          tag="$GITHUB_REF_NAME"
          notes="$RUNNER_TEMP/relnotes.md"
          # Pull just this version's section: from its "## [x.y.z]" heading to the
          # next "## [" heading. Fall back to auto-generated notes if absent.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > "$notes"
          if [ ! -s "$notes" ]; then
            printf 'Release %s.\n' "$tag" > "$notes"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "v${version}" --notes-file "$notes" --latest
          else
            gh release create "$tag" --title "v${version}" --notes-file "$notes" --latest
          fi

  linux:
    name: Linux (swift test)
    runs-on: ubuntu-latest
    container: swift:6.3-noble
    steps:
      - name: Install SQLite headers (GRDB links system SQLite)
        run: apt-get update && apt-get install -y --no-install-recommends libsqlite3-dev
      - uses: actions/checkout@v4
      # Cache compiled SwiftPM artifacts so each run doesn't recompile the whole
      # dependency tree (Hummingbird, GRDB, swift-crypto, swift-webauthn, …) from
      # scratch — that recompile dominates Linux CI time. Keyed on the resolved
      # deps + manifests by EXPLICIT path, not a `**` glob: the cache's post-run
      # save re-evaluates this key after the build, and a `**` glob walks the
      # freshly-created `.build` trees — whose SwiftPM symlinks make hashFiles
      # bail with "Fail to hash files under directory", failing the whole job (and
      # thus blocking the publish gate). Listing the manifests directly never
      # descends into `.build`; a path that doesn't exist yet (sphynx-protocol's
      # Package.resolved) is simply skipped. restore-keys warm-starts from the
      # last cache so SwiftPM incrementally rebuilds only what changed.
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            sphynx-server/.build
            sphynx-protocol/.build
          key: linux-swift6.3-spm-${{ hashFiles('sphynx-server/Package.swift', 'sphynx-server/Package.resolved', 'sphynx-protocol/Package.swift', 'sphynx-protocol/Package.resolved') }}
          restore-keys: |
            linux-swift6.3-spm-
      - run: swift --version
      - name: Test sphynx-protocol
        working-directory: sphynx-protocol
        run: swift test
      - name: Test sphynx-server
        working-directory: sphynx-server
        run: swift test
